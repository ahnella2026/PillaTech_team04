# Exp 11 Cleaned Baseline Inference Configuration
# 원본 Exp 5의 추론 환경(0.25 Conf, 0.70 IoU, 960px)을 완벽하게 재현하여 
# 데이터 정제의 ROI를 측정하기 위한 제출용 설정.

model: "runs/exp11_train_yolo11s_flip/weights/best.pt"
